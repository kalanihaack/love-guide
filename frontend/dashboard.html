<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Guide - Meu Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

<nav class="bg-gray-800 p-4 shadow-md flex justify-between items-center border-b border-gray-700">
    <h1 class="text-2xl font-bold text-pink-500 tracking-wide"><a href="https://love-guide-liard.vercel.app/dashboard.html">Love Guide 💖</a></h1>
    <div class="flex gap-4">
      <a href="profile.html" class="text-sm bg-pink-600 hover:bg-pink-700 text-white font-semibold px-4 py-2 rounded transition">
        Procurar Amigos 🔍
      </a>
      <button onclick="logout()" class="text-sm bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded transition">
        Sair
      </button>
    </div>
  </nav>
  

  <main class="container mx-auto p-6 max-w-6xl">

    <div class="mb-10 bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
      <h2 class="text-xl font-semibold mb-4 text-pink-500">Adicionar Novo Favorito</h2>
      <div class="flex flex-col md:flex-row gap-4">
        <select id="searchType" class="p-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-pink-500 md:w-1/4">
          <option value="music">Música</option>
          <option value="movies">Filme</option>
        </select>
        <input type="text" id="searchInput" placeholder="Comece a digitar para buscar..." class="flex-1 p-2 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-pink-500">
      </div>
      <div id="searchResultsGrid" class="mt-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 hidden"></div>
    </div>
    <div id="friendRequestsSection" class="mb-10 hidden">
      <h2 class="text-xl font-semibold mb-4 text-pink-500 border-b border-gray-700 pb-2">Convites de Amizade Recebidos 🔔</h2>
      <div id="friendRequestsList" class="space-y-3">
        </div>
    </div>
    <div class="mb-10">
      <h2 class="text-2xl font-semibold mb-4 border-b border-gray-700 pb-2">Minhas Músicas Favoritas</h2>
      <div id="songsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>
    </div>

    <div>
      <h2 class="text-2xl font-semibold mb-4 border-b border-gray-700 pb-2">Meus Filmes Favoritos</h2>
      <div id="moviesGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
        </div>
    </div>

  </main>

  <script>
    // ==========================================
    // COLOQUE A SUA URL DO RENDER AQUI ABAIXO!
    // ==========================================
    const API_URL = 'https://love-guide.onrender.com'; // Ex: https://sua-api.onrender.com
    
    const token = localStorage.getItem('loveguide_token');
    if (!token) window.location.href = 'index.html';

    let currentSearchResults = [];
    let typingTimer;
    const doneTypingInterval = 500;

    // --- LÓGICA DE BUSCA AUTOMÁTICA (DEBOUNCE) ---
    document.getElementById('searchInput').addEventListener('keyup', function() {
      clearTimeout(typingTimer);
      const query = this.value.trim();
      const grid = document.getElementById('searchResultsGrid');

      if (query.length >= 3) {
        grid.innerHTML = '<p class="text-gray-400 col-span-full">Buscando...</p>';
        grid.classList.remove('hidden');
        typingTimer = setTimeout(performSearch, doneTypingInterval);
      } else {
        grid.classList.add('hidden');
        grid.innerHTML = '';
      }
    });

    document.getElementById('searchType').addEventListener('change', function() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResultsGrid').classList.add('hidden');
    });

    // --- FUNÇÕES DA API ---
    async function performSearch() {
      const type = document.getElementById('searchType').value;
      const query = document.getElementById('searchInput').value;
      const grid = document.getElementById('searchResultsGrid');
      if (!query) return;

      try {
        const response = await fetch(`${API_URL}/${type}/search?query=${query}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        currentSearchResults = await response.json();

        if (currentSearchResults.length === 0) {
          grid.innerHTML = '<p class="text-gray-400 col-span-full">Nenhum resultado encontrado.</p>';
          return;
        }

        if (type === 'music') {
          grid.innerHTML = currentSearchResults.map((song, index) => `
            <div class="bg-gray-700 rounded overflow-hidden shadow">
              <img src="${song.cover_url}" class="w-full h-40 object-cover">
              <div class="p-2">
                <p class="font-bold text-xs truncate" title="${song.title}">${song.title}</p>
                <p class="text-xs text-gray-400 truncate">${song.artist}</p>
                <button onclick="saveItem(${index}, 'music')" class="mt-2 w-full bg-pink-500 hover:bg-pink-600 text-white text-xs py-1 rounded transition">Salvar</button>
              </div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = currentSearchResults.map((movie, index) => `
            <div class="bg-gray-700 rounded overflow-hidden shadow">
              <img src="${movie.poster_url || 'https://via.placeholder.com/500x750?text=Sem+Capa'}" class="w-full h-48 object-cover">
              <div class="p-2">
                <p class="font-bold text-xs truncate" title="${movie.title}">${movie.title}</p>
                <button onclick="saveItem(${index}, 'movies')" class="mt-2 w-full bg-pink-500 hover:bg-pink-600 text-white text-xs py-1 rounded transition">Salvar</button>
              </div>
            </div>
          `).join('');
        }
      } catch (error) {
         grid.innerHTML = '<p class="text-red-500 col-span-full">Erro na comunicação com o servidor.</p>';
      }
    }

    async function loadFavorites() {
      try {
        const response = await fetch(`${API_URL}/music/me/favorites`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
          logout(); return;
        }

        const data = await response.json();
        
        // Músicas com Spotify
        const songsGrid = document.getElementById('songsGrid');
        if (data.songs.length === 0) {
          songsGrid.innerHTML = '<p class="text-gray-400 col-span-full">Nenhuma música salva ainda.</p>';
        } else {
          songsGrid.innerHTML = data.songs.map(song => `
            <div onclick="openSpotify('${song.title}', '${song.artist}')" class="relative bg-gray-800 rounded-lg overflow-hidden shadow-lg border border-gray-700 hover:border-green-500 transition cursor-pointer group">
              <button onclick="event.stopPropagation(); deleteItem('${song.id}', 'music')" class="absolute top-2 right-2 bg-red-600 hover:bg-red-800 text-white rounded-full w-7 h-7 flex items-center justify-center font-bold shadow z-20">&times;</button>
              <img src="${song.cover_url}" alt="${song.title}" class="w-full h-48 object-cover">
              <div class="p-3">
                <p class="font-bold text-sm truncate" title="${song.title}">${song.title}</p>
                <p class="text-xs text-gray-400 truncate" title="${song.artist}">${song.artist}</p>
                <p class="text-xs text-green-500 mt-2 font-semibold flex items-center gap-1">▶ Ouvir no Spotify</p>
              </div>
            </div>
          `).join('');
        }

        // Filmes com Estrelas e Sinopse
        const moviesGrid = document.getElementById('moviesGrid');
        if (data.movies.length === 0) {
          moviesGrid.innerHTML = '<p class="text-gray-400 col-span-full">Nenhum filme salvo ainda.</p>';
        } else {
          moviesGrid.innerHTML = data.movies.map(movie => {
            const currentRating = movie.rating || 0;
            let starsHtml = '';
            for(let i=1; i<=5; i++) {
                starsHtml += `<span onclick="rateMovie('${movie.id}', ${i})" class="cursor-pointer text-xl ${i <= currentRating ? 'text-yellow-400' : 'text-gray-500'} hover:text-yellow-300 transition duration-150">★</span>`;
            }

            return `
            <div class="relative bg-gray-800 rounded-lg overflow-hidden shadow-lg border border-gray-700 hover:border-pink-500 transition">
              <button onclick="deleteItem('${movie.id}', 'movies')" class="absolute top-2 right-2 bg-red-600 hover:bg-red-800 text-white rounded-full w-7 h-7 flex items-center justify-center font-bold shadow z-30">&times;</button>
              <div class="relative group cursor-pointer">
                <img src="${movie.cover_url}" alt="${movie.title}" class="w-full h-64 object-cover">
                <div class="absolute inset-0 bg-black bg-opacity-90 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center p-4 z-20 pointer-events-none">
                  <p class="text-xs text-gray-200 text-center overflow-hidden" style="display: -webkit-box; -webkit-line-clamp: 10; -webkit-box-orient: vertical;">
                    ${movie.overview || 'Sinopse não disponível.'}
                  </p>
                </div>
              </div>
              <div class="p-3 relative z-20 bg-gray-800">
                <p class="font-bold text-sm truncate" title="${movie.title}">${movie.title}</p>
                <div class="flex justify-center mt-2 space-x-1">${starsHtml}</div>
              </div>
            </div>
          `}).join('');
        }
      } catch (error) {
        console.error(error);
      }
    }

    async function saveItem(index, type) {
      const item = currentSearchResults[index];
      let bodyData = {};
      let endpoint = '';

      if (type === 'music') {
        endpoint = `${API_URL}/music/favorites`;
        bodyData = { song_api_id: item.api_id, title: item.title, artist: item.artist, cover_url: item.cover_url };
      } else {
        endpoint = `${API_URL}/movies/favorites`;
        bodyData = { movie_api_id: item.api_id, title: item.title, overview: item.overview, poster_url: item.poster_url };
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(bodyData)
        });

        if (response.ok) {
          document.getElementById('searchResultsGrid').classList.add('hidden');
          document.getElementById('searchInput').value = '';
          loadFavorites(); 
        }
      } catch (error) { console.error(error); }
    }

    async function deleteItem(id, type) {
      if (!confirm('Tem certeza que deseja remover este favorito?')) return;
      try {
        const response = await fetch(`${API_URL}/${type}/favorites/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) loadFavorites();
      } catch (error) { console.error(error); }
    }

    async function rateMovie(id, rating) {
      try {
        const response = await fetch(`${API_URL}/movies/favorites/${id}/rating`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ rating })
        });
        if (response.ok) loadFavorites();
      } catch (error) { console.error(error); }
    }

    function openSpotify(title, artist) {
      const query = encodeURIComponent(`${title} ${artist}`);
      window.open(`https://open.spotify.com/search/${query}`, '_blank');
    }
// Busca convites pendentes no banco de dados
    async function loadFriendRequests() {
      try {
        const response = await fetch(`${API_URL}/friends/requests`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const requests = await response.json();
          const section = document.getElementById('friendRequestsSection');
          const list = document.getElementById('friendRequestsList');
          
          // Se tiver convites, exibe a seção. Se não tiver, esconde.
          if (requests.length > 0) {
            section.classList.remove('hidden');
            list.innerHTML = requests.map(req => `
              <div class="bg-gray-800 p-4 rounded border border-gray-700 flex justify-between items-center shadow">
                <div>
                  <p class="font-bold text-white text-lg">${req.sender.name}</p>
                  <p class="text-sm text-gray-400">${req.sender.email}</p>
                </div>
                <div class="flex gap-2">
                  <button onclick="respondRequest('${req.id}', 'ACCEPTED')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-bold transition shadow">Aceitar</button>
                  <button onclick="respondRequest('${req.id}', 'REJECTED')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm font-bold transition shadow">Recusar</button>
                </div>
              </div>
            `).join('');
          } else {
            section.classList.add('hidden');
          }
        }
      } catch (error) {
        console.error("Erro ao carregar convites:", error);
      }
    }
    // Envia a resposta (Aceitar ou Recusar) para a API
    async function respondRequest(id, action) {
      try {
        const response = await fetch(`${API_URL}/friends/requests/${id}`, {
          method: 'PATCH',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ action })
        });
        
        if (response.ok) {
          loadFriendRequests(); // Recarrega a lista para o convite sumir da tela
        } else {
          alert('Erro ao processar o convite.');
        }
      } catch (error) {
        console.error("Erro ao responder:", error);
      }
    }
    function logout() {
      localStorage.removeItem('loveguide_token');
      window.location.href = 'index.html';
    }

    loadFavorites();
    loadFavorites();
    loadFriendRequests(); // <-- Adicione esta linha para ele buscar os convites assim que você logar!
  </script>
</body>
</html>
